services:
  postgres:
    image: postgres:16-alpine
    container_name: spmw-postgres
    environment:
      POSTGRES_USER: spmw
      POSTGRES_PASSWORD: spmw_secret
      POSTGRES_DB: steelplant_maintenance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spmw -d steelplant_maintenance"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - spmw-net

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: spmw-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - spmw-net

  redis:
    image: redis:7-alpine
    container_name: spmw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - spmw-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spmw-backend
    profiles: ["full"]
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.docker
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
    volumes:
      - ./data:/app/data
      - ./backend/models:/app/backend/models
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spmw-net
    restart: unless-stopped

networks:
  spmw-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
