# Render Blueprint — backend + Postgres + Redis
# After deploy, set on spmw-backend → Environment:
#   GEMINI_API_KEY=...
#   CORS_ORIGINS=https://YOUR-APP.vercel.app
# Then deploy frontend on Vercel (root directory: frontend) with:
#   NEXT_PUBLIC_API_URL=https://spmw-backend.onrender.com/api/v1

services:
  - type: web
    name: spmw-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: VECTOR_STORE_MODE
        value: local
      - key: REDIS_URL
        fromService:
          type: redis
          name: spmw-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: spmw-postgres
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: spmw-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: redis
    name: spmw-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: spmw-postgres
    databaseName: steelplant_maintenance
    user: spmw
    plan: basic-256mb
    region: singapore
